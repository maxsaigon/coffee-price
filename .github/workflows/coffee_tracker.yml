name: Coffee Price Tracker

on:
  schedule:
    # GitHub cron is UTC. Vietnam is GMT+7.
    # Avoid :00/:30 because scheduled workflows are often queued there.
    # 8:10 VN -> 01:10 UTC
    # 15:10 VN -> 08:10 UTC
    - cron: '10 1 * * *'
    - cron: '10 8 * * *'
  
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run'
        required: true
        default: 'update'
        type: choice
        options:
        - update
        - test

jobs:
  coffee-price-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run coffee price tracker
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TIMEZONE: 'Asia/Ho_Chi_Minh'
        FUEL_REGION: '2'
        LOG_LEVEL: 'INFO'
      run: |
        python -m src.main ${{ github.event.inputs.command || 'update' }}
